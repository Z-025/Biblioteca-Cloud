version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    environment:
      - ORACLE_PASSWORD=TuPassword123
    ports:
      - "1521:1521"

  faas-usuarios:
    build: ./faas-usuarios
    ports:
      - "8081:80"
    environment:
      - DB_URL=jdbc:oracle:thin:@//oracle-db:1521/XE
      - DB_USER=system
      - DB_PASSWORD=TuPassword123
    depends_on:
      - oracle-db

  faas-prestamos:
    build: ./faas-prestamos
    ports:
      - "8082:80"
    environment:
      - DB_URL=jdbc:oracle:thin:@//oracle-db:1521/XE
      - DB_USER=system
      - DB_PASSWORD=TuPassword123
    depends_on:
      - oracle-db

  bff-biblioteca:
    build: ./bff-biblioteca
    ports:
      - "8080:8080"
    environment:
      # Aquí cumplimos el punto 4 de la rúbrica: URLs dinámicas para Docker Lab
      - URL_FAAS_USUARIOS=http://faas-usuarios:80/api/AdministrarUsuarios
      - URL_FAAS_PRESTAMOS=http://faas-prestamos:80/api/AdministrarPrestamos
    depends_on:
      - faas-usuarios
      - faas-prestamos